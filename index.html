<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ff8fb1">
    <title>Para Mi Amor 💖</title>
    <style>
        /*
         * SHELL: esta página nunca se recarga al navegar entre secciones.
         * Las secciones se cargan dentro del <iframe>, así la música (que vive
         * aquí, en js/shell.js) NUNCA se corta. Solo cambia cuando una sección
         * pide otra pista distinta.
         */
        html, body { height: 100%; margin: 0; background: #15041c; overflow: hidden; }
        #appFrame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: transparent;
        }
        /* tiny fade between sections so el cambio se ve suave */
        #appFrame { transition: opacity 0.25s ease; }
        #appFrame.fading { opacity: 0; }
    </style>
</head>
<body>
    <iframe id="appFrame"
            title="Para mi peque"
            allow="autoplay; fullscreen; encrypted-media"
            allowfullscreen
            src="lock.html"></iframe>

    <script src="js/shell.js"></script>
</body>
</html>
