<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a0820">
    <title>Un ramo para ti 💐</title>
    <link rel="stylesheet" href="css/sorpresa.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="petals" id="petals"></div>

    <!-- Definición del lirio reutilizable -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
            <radialGradient id="petalG" cx="50%" cy="64%" r="62%">
                <stop offset="0%"  stop-color="#ffd7e7"/>
                <stop offset="42%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#ffe9f2"/>
            </radialGradient>
            <symbol id="lily" viewBox="0 0 100 100">
                <g fill="url(#petalG)" stroke="#f0c4d7" stroke-width="0.8" stroke-linejoin="round">
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(0 50 52)"/>
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(60 50 52)"/>
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(120 50 52)"/>
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(180 50 52)"/>
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(240 50 52)"/>
                    <path d="M50 52 C43 34 44 14 50 5 C56 14 57 34 50 52 Z" transform="rotate(300 50 52)"/>
                </g>
                <g fill="#e76aa0" opacity="0.5">
                    <g transform="rotate(0 50 52)"><circle cx="48" cy="40" r="0.9"/><circle cx="52" cy="34" r="0.8"/><circle cx="50" cy="28" r="0.7"/></g>
                    <g transform="rotate(120 50 52)"><circle cx="48" cy="40" r="0.9"/><circle cx="52" cy="34" r="0.8"/><circle cx="50" cy="28" r="0.7"/></g>
                    <g transform="rotate(240 50 52)"><circle cx="48" cy="40" r="0.9"/><circle cx="52" cy="34" r="0.8"/><circle cx="50" cy="28" r="0.7"/></g>
                </g>
                <g stroke="#d98b34" stroke-width="1.4" stroke-linecap="round">
                    <g transform="rotate(30 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                    <g transform="rotate(90 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                    <g transform="rotate(150 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                    <g transform="rotate(210 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                    <g transform="rotate(270 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                    <g transform="rotate(330 50 52)"><line x1="50" y1="52" x2="50" y2="35"/></g>
                </g>
                <g fill="#a85a1c">
                    <g transform="rotate(30 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                    <g transform="rotate(90 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                    <g transform="rotate(150 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                    <g transform="rotate(210 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                    <g transform="rotate(270 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                    <g transform="rotate(330 50 52)"><ellipse cx="50" cy="34" rx="2.1" ry="3.3"/></g>
                </g>
                <circle cx="50" cy="52" r="3.6" fill="#ffd95e"/>
                <circle cx="50" cy="52" r="1.6" fill="#f2a93c"/>
            </symbol>
        </defs>
    </svg>

    <section class="view ramo-view">
        <a href="sorpresa.html" class="back-btn" aria-label="volver">←</a>

        <h2 class="ramo-title">Liryos para ti 💐</h2>

        <div class="ramo-stage">
            <div class="grow-scene" id="growScene">
                <div class="ground-glow"></div>
                <div class="grow-sparkles" id="growSparkles"></div>

                <div class="plant p1 back"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p2 back"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p3"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p4"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p5"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p6"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p7"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p8 back"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
                <div class="plant p9 back"><div class="swayer"><div class="stalk"></div><span class="lf lf1"></span><span class="lf lf2"></span><svg class="bloom"><use href="#lily" xlink:href="#lily"/></svg></div></div>
            </div>
        </div>

        <button type="button" class="replay-btn" id="replayBtn">🌱 Ver florecer otra vez</button>

        <p class="ramo-note">
            Aún no se me olvida dártelas…<br>
            <strong>cuando nos volvamos a ver, te esperaré con ellas</strong> 💐💗
        </p>
    </section>

    <script src="js/ramo.js"></script>
    <script src="js/page.js"></script>
    <script>pageMusic('menu');</script>
</body>
</html>
